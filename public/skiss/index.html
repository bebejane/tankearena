<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TankeArena för Kultur</title>
  <link rel="icon" type="image/png" href="icon/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="icon/favicon.svg">
  <link rel="shortcut icon" href="icon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
  <link rel="manifest" href="icon/site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page">
    <div class="grid">

      <div class="illustration">
        <img src="images/illustration.png" alt="">
      </div>

      <div class="logo">
        <img class="logo-full" src="images/logo_rgb.svg" alt="TankeArena för Kultur">
        <img class="logo-symbol" src="images/symbol_rgb.svg" alt="">
      </div>

      <div class="text">
        <p>TAK är en ny tankearena för kultur som ska stärka kulturens roll i samhället. Verksamheten är under
          uppbyggnad och ligger hos <a href="https://www.iffs.se/" target="_blank" rel="noopener noreferrer"><em>Institutet för framtidsstudier</em></a> i Stockholm.</p>
        <p>TAK är initierat och drivs av Magdalena Malm. För mer information om oss <a href="mailto:mm@tankearenaforkultur.se" target="_blank" rel="noopener noreferrer"><em>skicka ett mail</em></a> eller följ
          oss
          på <a href="https://www.instagram.com/tankearenaforkultur/" target="_blank" rel="noopener noreferrer"><em>Instagram</em></a>.</p>
      </div>

    </div>
  </main>
</body>

</html>
